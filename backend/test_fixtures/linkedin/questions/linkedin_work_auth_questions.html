<html>
<head>
    <title>LinkedIn Easy Apply - Work Authorization Questions</title>
</head>
<body>
    <div class="application-form">
        <h2>Application Questions</h2>

        <div class="question-group">
            <label for="work_auth">Are you authorized to work in the United States?</label>
            <select id="work_auth" name="work_authorization" required>
                <option value="">Select...</option>
                <option value="yes">Yes, I am authorized</option>
                <option value="no">No, I require sponsorship</option>
            </select>
        </div>

        <div class="question-group">
            <label for="sponsorship">Will you require sponsorship?</label>
            <select id="sponsorship" name="sponsorship" required>
                <option value="">Select...</option>
                <option value="yes">Yes, I will require sponsorship</option>
                <option value="no">No, I don't require sponsorship</option>
            </select>
        </div>

        <div class="question-group">
            <label for="years_exp">Years of relevant experience:</label>
            <input type="text" id="years_exp" name="years_experience" placeholder="e.g., 5" />
        </div>

        <div class="question-group">
            <label for="notice_period">Notice period:</label>
            <select id="notice_period" name="notice_period">
                <option value="">Select...</option>
                <option value="immediate">Immediate</option>
                <option value="2weeks">2 weeks</option>
                <option value="4weeks">4 weeks</option>
                <option value="8weeks">8 weeks</option>
            </select>
        </div>

        <div class="question-group">
            <label for="relocation">Are you willing to relocate?</label>
            <input type="radio" id="relocation_yes" name="relocation" value="yes" />
            <label for="relocation_yes" style="display: inline;">Yes</label>
            <input type="radio" id="relocation_no" name="relocation" value="no" />
            <label for="relocation_no" style="display: inline;">No</label>
        </div>

        <button type="submit">Continue</button>
    </div>
</body>
</html>
