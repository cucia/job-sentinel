<html>
<head>
    <title>Personal Information - Multi-Page Workflow</title>
    <style>
        * { font-family: Arial, sans-serif; }
        body { max-width: 600px; margin: 50px auto; padding: 20px; }
        .page-title { color: #0066cc; margin-bottom: 5px; }
        .page-number { color: #999; font-size: 14px; margin-bottom: 20px; }
        form { border: 1px solid #ddd; padding: 20px; border-radius: 5px; background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], select, textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0052a3; }
        .form-progress { background: #e8f0ff; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1 class="page-title">Job Application Form</h1>
    <p class="page-number">Page 1 of 5: Personal Information</p>

    <div class="form-progress">
        <strong>Progress:</strong> <span id="progress">1/5</span>
        <div style="width: 100%; height: 20px; background: #ddd; border-radius: 4px; margin-top: 5px;">
            <div style="width: 20%; height: 100%; background: #0066cc; border-radius: 4px;"></div>
        </div>
    </div>

    <form id="page1Form">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required />
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required />
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter email" required />
        </div>

        <button type="button" id="continuePage1" onclick="goToPage2()">Continue to Page 2</button>
    </form>

    <script>
        function goToPage2() {
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;

            if (firstName && lastName && email) {
                // Store in sessionStorage to persist across page loads
                sessionStorage.setItem('workflow_firstName', firstName);
                sessionStorage.setItem('workflow_lastName', lastName);
                sessionStorage.setItem('workflow_email', email);
                window.location.href = 'page2_questions.html';
            }
        }
    </script>
</body>
</html>
