<html>
<head>
    <title>Changed Button Text - Recovery Test</title>
    <style>
        * { font-family: Arial, sans-serif; }
        body { max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #0066cc; }
        form { border: 1px solid #ddd; padding: 20px; border-radius: 5px; background: #f9f9f9; }
        .form-group { margin: 15px 0; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #0052a3; }
        .info { background: #e8f0ff; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <h1>Changed Button Text - Recovery Test</h1>
    <p>Tests text search recovery when button ID changes but text is recognizable.</p>

    <div class="info">
        <strong>Note:</strong> Button ID doesn't match expected selector.
        Recovery should find it by visible text "Continue".
    </div>

    <form id="textForm">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter username" />
        </div>

        <!-- Button with non-standard ID but recognizable text -->
        <button type="button" id="btn_action_xyz" onclick="handleSubmit()">Continue</button>
    </form>

    <script>
        function handleSubmit() {
            const username = document.getElementById('username').value;
            if (username) {
                sessionStorage.setItem('text_recovery_success', 'true');
                alert('Form submitted!');
            } else {
                alert('Please enter username');
            }
        }
    </script>
</body>
</html>
