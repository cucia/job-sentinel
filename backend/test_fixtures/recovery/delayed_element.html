<html>
<head>
    <title>Delayed Element - Recovery Test</title>
    <style>
        * { font-family: Arial, sans-serif; }
        body { max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #0066cc; }
        .form-group { margin: 15px 0; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #0052a3; }
        .loading { background: #fff3cd; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .info { font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <h1>Delayed Element Test</h1>
    <p>This fixture tests recovery when elements appear after a delay.</p>

    <div class="loading">
        <strong>Loading form...</strong>
        <div class="info">The submit button will appear after 2 seconds.</div>
    </div>

    <form id="delayedForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" />
        </div>

        <!-- This button appears after delay -->
        <button type="button" id="delayedSubmit" onclick="handleSubmit()" style="display:none;">Submit</button>
    </form>

    <script>
        // Show button after 2 seconds
        setTimeout(() => {
            const btn = document.getElementById('delayedSubmit');
            btn.style.display = 'block';
            sessionStorage.setItem('delayed_element_ready', 'true');
        }, 2000);

        function handleSubmit() {
            sessionStorage.setItem('delayed_form_submitted', 'true');
            alert('Form submitted!');
        }
    </script>
</body>
</html>
