<html>
<head>
    <title>Resume Upload - Job Sentinel</title>
    <style>
        * { font-family: Arial, sans-serif; }
        body { max-width: 600px; margin: 50px auto; padding: 20px; }
        .container { border: 1px solid #ddd; padding: 20px; border-radius: 5px; background: #f9f9f9; }
        h1 { color: #0066cc; margin-bottom: 10px; }
        .subtitle { color: #999; font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input[type="file"] { border: 1px solid #ccc; padding: 8px; border-radius: 4px; }
        .file-info { background: #e8f0ff; padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 13px; }
        button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0052a3; }
        .success-section { display: none; background: #d4edda; border: 1px solid #28a745; padding: 15px; border-radius: 4px; margin-top: 20px; }
        .success-section h3 { color: #155724; margin-top: 0; }
        .success-section p { color: #155724; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Upload</h1>
        <p class="subtitle">Test fixture for file upload validation</p>

        <form id="uploadForm">
            <div class="form-group">
                <label for="resume">Upload Resume (PDF, DOC, or DOCX)</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required />
                <div class="file-info">
                    <strong>Note:</strong> In this test fixture, any file can be uploaded for testing purposes.
                </div>
            </div>

            <div class="form-group">
                <button type="button" id="uploadButton" onclick="handleUpload()">Upload Resume</button>
            </div>
        </form>

        <div class="success-section" id="successSection">
            <h3>✓ Resume Uploaded Successfully</h3>
            <p><strong>File Name:</strong> <span id="uploadedFileName">-</span></p>
            <p><strong>File Size:</strong> <span id="uploadedFileSize">-</span> bytes</p>
            <p><strong>Upload Time:</strong> <span id="uploadedTime">-</span></p>
            <button type="button" onclick="continuePage()">Continue to Next Step</button>
        </div>
    </div>

    <script>
        function handleUpload() {
            const fileInput = document.getElementById('resume');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a file');
                return;
            }

            // Simulate upload
            const now = new Date().toLocaleString();
            document.getElementById('uploadedFileName').textContent = file.name;
            document.getElementById('uploadedFileSize').textContent = file.size;
            document.getElementById('uploadedTime').textContent = now;

            // Show success section
            document.getElementById('successSection').style.display = 'block';

            // Store upload info in sessionStorage
            sessionStorage.setItem('upload_filename', file.name);
            sessionStorage.setItem('upload_filesize', file.size);
            sessionStorage.setItem('upload_time', now);
            sessionStorage.setItem('upload_success', 'true');
        }

        function continuePage() {
            alert('Resume uploaded successfully! (This is a test fixture)');
        }
    </script>
</body>
</html>
