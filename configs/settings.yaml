app:
  headless: false
  run_interval_seconds: 60
  resume_path: resumes/resume.pdf
  pipeline_mode: direct_latest
  latest_results_limit: 100
  apply_all: true
  use_ai: true
  use_policy: false
  easy_apply_first: true
  entry_level_only: false
  seniority_blocklist:
    - senior
    - lead
    - manager
    - principal
    - director
    - head
    - staff
    - architect

storage:
  db_path: data/jobsentinel.db
  history_limit: 400

limits:
  daily_applications: 10

policy:
  allowed_roles: []
  required_skills: []
  blocked_keywords: []

ai:
  min_score: 70
  uncertainty_margin: 5
  use_llm: false
  llm_model: llama3.2:latest

platforms:
  enabled:
    - linkedin
    # - indeed
    # - naukri
  sessions:
    linkedin: sessions/linkedin.json
    indeed: sessions/indeed.json
    naukri: sessions/naukri.json
  linkedin:
    search:
      keywords:
        - security
      location: India
      max_results: 100
      tpr_seconds: 0
      easy_apply_only: false
  indeed:
    search:
      keywords:
        - cybersecurity
        - soc analyst
      location: India
      max_results: 100
  naukri:
    search:
      keywords:
        - security
      location: India
      max_results: 100
