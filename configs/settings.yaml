app:
  headless: true
  run_interval_seconds: 60
  resume_path: resumes/resume.pdf
  pipeline_mode: direct_latest
  latest_results_limit: 100
  apply_all: true
  use_ai: true
  use_policy: false
  easy_apply_first: true
  entry_level_only: false
  browser: firefox
  seniority_blocklist:
  - senior
  - lead
  - manager
  - principal
  - director
  - head
  - staff
  - architect
storage:
  db_path: data/jobsentinel.db
  history_limit: 400
policy:
  allowed_roles: []
  required_skills: []
  blocked_keywords: []
ai:
  min_score: 50
  uncertainty_margin: 5
  use_agents: true
  use_multi_agent: true
  use_cloud: true
  provider: groq
  model: llama-3.1-8b-instant
  use_llm: false
  llm_model: llama3.2:latest
  agent_controls:
    evaluator:
      enabled: true
    application:
      enabled: true
    review:
      enabled: true
      updated_at: '2026-05-02T08:24:26.136286+00:00'
    strategy:
      enabled: true
      updated_at: '2026-05-02T08:56:02.768290+00:00'
    navigator:
      enabled: true
    form_detector:
      enabled: true
    form_filler:
      enabled: true
    recovery:
      enabled: true
platforms:
  enabled: []
  sessions:
    linkedin: sessions/linkedin.json
    indeed: sessions/indeed.json
    naukri: sessions/naukri.json
  linkedin:
    search:
      keywords: []
      location: India
      max_results: 100
      tpr_seconds: 0
      easy_apply_only: false
  indeed:
    search:
      keywords: []
      location: India
      max_results: 100
  naukri:
    search:
      keywords: []
      location: India
      max_results: 100
