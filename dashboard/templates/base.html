<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}JobSentinel{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar" id="overview">
      <div class="brand">
        <div class="brand-mark">JS</div>
        <div>
          <div class="brand-title">JobSentinel</div>
          <div class="brand-subtitle">Entry-level cybersecurity sweep</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-link {{ 'active' if current_page == 'overview' else '' }}" href="{{ url_for('index', profile=profile_name) if profile_name is defined else url_for('index') }}">Overview</a>
        <a class="nav-link {{ 'active' if current_page == 'automation' else '' }}" href="{{ url_for('automation', profile=profile_name) if profile_name is defined else url_for('automation') }}">Automation</a>
        <a class="nav-link {{ 'active' if current_page == 'sessions' else '' }}" href="{{ url_for('sessions_page', profile=profile_name) if profile_name is defined else url_for('sessions_page') }}">Sessions</a>
        <a class="nav-link {{ 'active' if current_page == 'profile' else '' }}" href="{{ url_for('profile_page', profile=profile_name) if profile_name is defined else url_for('profile_page') }}">Profile</a>
        <a class="nav-link {{ 'active' if current_page == 'jobs' else '' }}" href="{{ url_for('all_jobs') }}">Jobs</a>
        <a class="nav-link {{ 'active' if current_page == 'logs' else '' }}" href="{{ url_for('logs', profile=profile_name) if profile_name is defined else url_for('logs') }}">Logs</a>
      </nav>
      <div class="tabs">
        {% if show_export %}
        <a class="tab export-pill" href="/export.csv?status={{ current_status or 'all' }}">export csv</a>
        {% endif %}
      </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
